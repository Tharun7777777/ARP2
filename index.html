<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapSense</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; }

        #map { height: 100vh; width: 100%; }

        /* ── Sidebar ── */
        #sidebar {
            position: fixed;
            top: 0; right: -360px;
            width: 340px; height: 100vh;
            background: #ffffff;
            box-shadow: -4px 0 20px rgba(0,0,0,0.18);
            padding: 16px;
            transition: right 0.35s ease;
            overflow-y: auto;
            z-index: 9999;
        }
        #sidebar.open { right: 0; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .sidebar-header h2 { font-size: 18px; }

        .close-btn {
            background: none; border: none;
            font-size: 22px; cursor: pointer; color: #555;
        }

        /* ── Route box ── */
        #route-box {
            position: absolute;
            top: 12px; left: 12px;
            z-index: 9999;
            background: white;
            padding: 10px 12px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        }
        #route-box input {
            display: block;
            width: 190px;
            margin: 4px 0;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
        }
        #route-box button {
            margin-top: 6px;
            width: 100%;
            padding: 7px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        #route-box button:hover { background: #1d4ed8; }

        /* ── Status bar ── */
        #data-timestamp {
            position: fixed;
            bottom: 50px; left: 10px;
            z-index: 9999;
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            color: #555;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        #refresh-btn {
            position: fixed;
            bottom: 16px; left: 10px;
            z-index: 9999;
            background: white;
            border: 1px solid #ddd;
            padding: 7px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
            cursor: pointer;
            font-size: 13px;
        }
        #refresh-btn:hover { background: #f5f5f5; }

        /* ── Route list in sidebar ── */
        .route-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .route-card:hover { border-color: #2563eb; }
        .route-card.active { border-color: #2563eb; background: #eff6ff; }

        .route-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .route-title { font-weight: 700; font-size: 14px; }
        .route-meta { font-size: 12px; color: #666; margin-top: 2px; }
        .risk-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .risk-low    { background: #d1fae5; color: #065f46; }
        .risk-medium { background: #fef3c7; color: #92400e; }
        .risk-high   { background: #fee2e2; color: #991b1b; }

        .turns-btn {
            margin-top: 8px;
            padding: 4px 10px;
            font-size: 12px;
            background: #e5e7eb;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .turns-btn:hover { background: #d1d5db; }

        #turn-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }
        #turn-list li {
            padding: 7px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #turn-list li span.icon { font-size: 18px; flex-shrink: 0; }

        .route-tooltip {
            background: rgba(255,255,255,0.92);
            color: #111;
            font-weight: bold;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            border: 1px solid #ddd;
            pointer-events: none;
        }

        #advice-box { margin-top: 10px; font-size: 13px; }
        #advice-box.low    { color: #065f46; }
        #advice-box.medium { color: #92400e; }
        #advice-box.high   { color: #991b1b; }

        hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>🗺 MapSense</h2>
        <button class="close-btn" id="closeSidebar">✕</button>
    </div>
    <div id="risk-score"></div>
    <div id="risk-details"></div>
    <div id="advice-box"></div>
    <ol id="turn-list"></ol>
</div>

<div id="route-box">
    <input id="start" placeholder="Start location" />
    <input id="end" placeholder="End location" />
    <button onclick="getRouteMultiple()">🔍 Find Route</button>
</div>

<div id="data-timestamp">⏳ Loading live data…</div>
<button id="refresh-btn" onclick="loadAllData()">🔄 Refresh Data</button>

<script>
// ─────────────────────────────────────────────────
// GLOBALS
// ─────────────────────────────────────────────────
let acc = [], poll = [], traffic = [], hosp = [];
let combinedPoints = [];
let routeLayers = [], routesInfo = [];

let accidentLayer, pollutionLayer, trafficLayer, hospitalLayer, combinedLayer;
let hoverGroup;
let layerControl;

const heatCfg = {
    radius: 60, blur: 35, maxZoom: 17, minOpacity: 0.4,
    gradient: { 0.2:"blue", 0.4:"cyan", 0.6:"lime", 0.8:"yellow", 1.0:"red" }
};

// ─────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────
const map = L.map("map");
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
map.setView([10.8505, 76.2711], 7);

document.getElementById("closeSidebar").onclick = () =>
    document.getElementById("sidebar").classList.remove("open");

// ─────────────────────────────────────────────────
// LIVE DATA LOADING
// ─────────────────────────────────────────────────
async function loadAllData() {
    const ts = document.getElementById("data-timestamp");
    ts.textContent = "⏳ Fetching live data…";

    try {
        const [accData, pollData, trafficData, hospData] = await Promise.all([
            fetch("/api/accidents").then(r => { if (!r.ok) throw new Error("accidents"); return r.json(); }),
            fetch("/api/pollution").then(r => { if (!r.ok) throw new Error("pollution"); return r.json(); }),
            fetch("/api/traffic").then(r  => { if (!r.ok) throw new Error("traffic");   return r.json(); }),
            fetch("hospital.json").then(r => { if (!r.ok) throw new Error("hospital");  return r.json(); })
        ]);

        acc     = accData;
        poll    = pollData;
        traffic = trafficData;
        hosp    = hospData;

        ts.textContent = "✅ Live data — " + new Date().toLocaleTimeString();
        buildLayers();
    } catch (err) {
        console.error("Data load error:", err);
        ts.textContent = "❌ Error loading: " + err.message + " — retrying in 60s";
        setTimeout(loadAllData, 60000);
    }
}

// ─────────────────────────────────────────────────
// BUILD / REFRESH HEATMAP LAYERS
// ─────────────────────────────────────────────────
function buildLayers() {
    // Remove old layers
    [accidentLayer, pollutionLayer, trafficLayer, hospitalLayer, combinedLayer, hoverGroup]
        .forEach(l => { if (l && map.hasLayer(l)) map.removeLayer(l); });
    if (layerControl) layerControl.remove();

    // Combined risk
    combinedPoints = [];
    const n = Math.min(acc.length, poll.length, traffic.length, hosp.length);
    for (let i = 0; i < n; i++) {
        if (!acc[i]?.lat) continue;
        const v = (acc[i].value||0)*0.35 + (traffic[i].value||0)*0.30
                + (poll[i].value||0)*0.20  + (hosp[i].value||0)*0.15;
        combinedPoints.push([acc[i].lat, acc[i].lng, v]);
    }

    accidentLayer  = L.heatLayer(acc.map(d     => [d.lat, d.lng, d.value]), heatCfg);
    pollutionLayer = L.heatLayer(poll.map(d    => [d.lat, d.lng, d.value]), heatCfg);
    trafficLayer   = L.heatLayer(traffic.map(d => [d.lat, d.lng, d.value]), heatCfg);
    hospitalLayer  = L.heatLayer(hosp.map(d    => [d.lat, d.lng, d.value]), heatCfg);
    combinedLayer  = L.heatLayer(combinedPoints, heatCfg);

    // Invisible hover markers
    hoverGroup = L.layerGroup().addTo(map);
    const allSets = [
        { data: acc,     label: "🚧 Accident Risk" },
        { data: traffic, label: "🚦 Traffic" },
        { data: poll,    label: "🏭 Pollution" },
        { data: hosp,    label: "🏥 Hospital Load" }
    ];
    allSets.forEach(({ data, label }) => {
        data.forEach(p => {
            L.circleMarker([p.lat, p.lng], {
                radius: 8, color: "transparent",
                fillColor: "transparent", fillOpacity: 0.01
            })
            .bindTooltip(`${label}: ${p.value}`, { permanent: false })
            .addTo(hoverGroup);
        });
    });

    // Layer control
    const overlays = {
        "🚧 Accidents":   accidentLayer,
        "🏭 Pollution":   pollutionLayer,
        "🚦 Traffic":     trafficLayer,
        "🏥 Hospital":    hospitalLayer,
        "🔥 Combined Risk": combinedLayer,
        "ℹ️ Info tooltips": hoverGroup
    };
    layerControl = L.control.layers(null, overlays).addTo(map);

    // Default: show combined
    combinedLayer.addTo(map);
}

// ─────────────────────────────────────────────────
// MAP CLICK — RISK POPUP
// ─────────────────────────────────────────────────
map.on("click", e => {
    const { lat, lng } = e.latlng;
    const a = closest(acc,     lat, lng)?.value || 0;
    const t = closest(traffic, lat, lng)?.value || 0;
    const p = closest(poll,    lat, lng)?.value || 0;
    const h = closest(hosp,    lat, lng)?.value || 0;
    const score = a*0.35 + t*0.30 + p*0.20 + h*0.15;

    const advice = score > 0.75
        ? "<span style='color:red'>⚠ High Risk — avoid if possible</span>"
        : score > 0.50
        ? "<span style='color:orange'>⚠ Medium Risk — use caution</span>"
        : "<span style='color:green'>✓ Low Risk — generally safe</span>";

    L.popup()
     .setLatLng([lat, lng])
     .setContent(`
        <b>📍 Risk Analysis</b><br><br>
        🚧 Accident Risk: <b>${a.toFixed(2)}</b><br>
        🚦 Traffic Level: <b>${t.toFixed(2)}</b><br>
        🏭 Pollution:     <b>${p.toFixed(2)}</b><br>
        🏥 Hospital Load: <b>${h.toFixed(2)}</b><br><br>
        🔥 <b>Total Risk: ${score.toFixed(2)}</b><br>${advice}
     `)
     .openOn(map);
});

// ─────────────────────────────────────────────────
// USER LOCATION
// ─────────────────────────────────────────────────
map.locate({ maxZoom: 15, enableHighAccuracy: true });
map.on("locationfound", e => {
    L.marker(e.latlng).addTo(map).bindPopup("📍 Your Location").openPopup();
    map.setView(e.latlng, 10);
});

// ─────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371, r = Math.PI / 180;
    const dLat = (lat2 - lat1) * r, dLon = (lon2 - lon1) * r;
    const a = Math.sin(dLat/2)**2
            + Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function closest(dataset, lat, lng) {
    let best = null, min = Infinity;
    dataset.forEach(p => {
        const d = haversine(lat, lng, p.lat, p.lng);
        if (d < min) { min = d; best = p; }
    });
    return best;
}

function riskAtPoint(lat, lng) {
    const a = closest(acc,     lat, lng)?.value || 0;
    const t = closest(traffic, lat, lng)?.value || 0;
    const p = closest(poll,    lat, lng)?.value || 0;
    const h = closest(hosp,    lat, lng)?.value || 0;
    return a*0.35 + t*0.30 + p*0.20 + h*0.15;
}

function segmentColor(risk) {
    if (risk < 0.2) return "#22c55e";
    if (risk < 0.4) return "#a3e635";
    if (risk < 0.6) return "#facc15";
    if (risk < 0.8) return "#f97316";
    return "#ef4444";
}

function riskLabel(score) {
    return score < 0.4 ? "Low" : score < 0.7 ? "Medium" : "High";
}
function riskClass(score) {
    return score < 0.4 ? "risk-low" : score < 0.7 ? "risk-medium" : "risk-high";
}

// ─────────────────────────────────────────────────
// GEOCODING
// ─────────────────────────────────────────────────
async function geocode(place) {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`;
    const data = await fetch(url).then(r => r.json());
    if (!data?.length) throw new Error("Location not found: " + place);
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
}

// ─────────────────────────────────────────────────
// RISK FOR A FULL ROUTE
// ─────────────────────────────────────────────────
function computeRouteRisk(coords) {
    // Sample every 10th coord
    const sampled = coords.filter((_, i) => i % 10 === 0);
    let aSum=0, tSum=0, pSum=0, hSum=0;
    sampled.forEach(c => {
        const lat = c[1], lng = c[0];
        aSum += closest(acc,     lat, lng)?.value || 0;
        tSum += closest(traffic, lat, lng)?.value || 0;
        pSum += closest(poll,    lat, lng)?.value || 0;
        hSum += closest(hosp,    lat, lng)?.value || 0;
    });
    const n = sampled.length || 1;
    const aAvg=aSum/n, tAvg=tSum/n, pAvg=pSum/n, hAvg=hSum/n;
    return {
        accAvg: aAvg, trafficAvg: tAvg, pollAvg: pAvg, hospAvg: hAvg,
        combined: aAvg*0.35 + tAvg*0.30 + pAvg*0.20 + hAvg*0.15
    };
}

// ─────────────────────────────────────────────────
// GET ROUTES (OSRM)
// ─────────────────────────────────────────────────
async function getRouteMultiple() {
    const s = document.getElementById("start").value;
    const e = document.getElementById("end").value;
    if (!s || !e) return alert("Enter start & end location");

    let sCoord, eCoord;
    try {
        [sCoord, eCoord] = await Promise.all([geocode(s), geocode(e)]);
    } catch (err) {
        return alert(err.message);
    }

    const url = `https://router.project-osrm.org/route/v1/driving/${sCoord.lng},${sCoord.lat};${eCoord.lng},${eCoord.lat}?overview=full&geometries=geojson&alternatives=true&steps=true`;
    const data = await fetch(url).then(r => r.json());
    if (!data?.routes?.length) return alert("No routes found");

    processRoutes(data.routes);
}

// ─────────────────────────────────────────────────
// PROCESS & RENDER ROUTES
// ─────────────────────────────────────────────────
function processRoutes(osrmRoutes) {
    // Clear old route lines
    routeLayers.forEach(obj => map.removeLayer(obj.line));
    routeLayers = [];
    routesInfo  = [];

    osrmRoutes.forEach((route, idx) => {
        const coords = route.geometry.coordinates;  // [lng, lat]
        const risk   = computeRouteRisk(coords);
        const steps  = (route.legs?.[0]?.steps || []);

        routesInfo.push({
            index: idx,
            coords,
            durationMin: Math.round(route.duration / 60),
            distanceKm:  (route.distance / 1000).toFixed(1),
            risk,
            steps
        });
    });

    // Best = lowest combined risk
    const best = routesInfo.reduce((m, r) => r.risk.combined < m.risk.combined ? r : m, routesInfo[0]);

    // Draw heatmap-coloured lines
    routesInfo.forEach(info => {
        info.coords.forEach((c, i) => {
            if (i === info.coords.length - 1) return;
            const lat = (info.coords[i][1] + info.coords[i+1][1]) / 2;
            const lng = (info.coords[i][0] + info.coords[i+1][0]) / 2;
            const color = segmentColor(riskAtPoint(lat, lng));
            const line = L.polyline(
                [[info.coords[i][1], info.coords[i][0]], [info.coords[i+1][1], info.coords[i+1][0]]],
                { color, weight: 5, opacity: 0.85 }
            ).addTo(map);
            line.bindTooltip(`Route ${info.index + 1}`, { direction:"top", className:"route-tooltip" });
            line.on("click", () => showTurns(info));
            routeLayers.push({ line, index: info.index });
        });
    });

    map.fitBounds(routesInfo[0].coords.map(c => [c[1], c[0]]));
    renderSidebar(routesInfo, best.index);
}

// ─────────────────────────────────────────────────
// HIGHLIGHT ROUTE
// ─────────────────────────────────────────────────
function highlightRoute(idx) {
    routeLayers.forEach(obj => {
        obj.line.setStyle({
            weight:  obj.index === idx ? 7 : 4,
            opacity: obj.index === idx ? 1 : 0.4
        });
    });
}

// ─────────────────────────────────────────────────
// SIDEBAR RENDER
// ─────────────────────────────────────────────────
function renderSidebar(routesInfo, bestIdx) {
    let html = `<h3 style="margin-bottom:10px;">🛣 Route Options</h3>`;

    routesInfo.forEach(info => {
        const r     = info.risk;
        const rl    = riskLabel(r.combined);
        const rc    = riskClass(r.combined);
        const star  = info.index === bestIdx ? " ⭐ <b>Recommended</b>" : "";
        html += `
        <div class="route-card" data-idx="${info.index}" onclick="selectRoute(${info.index})">
            <div class="route-card-header">
                <div>
                    <div class="route-title">Route ${info.index + 1}${star}</div>
                    <div class="route-meta">${info.durationMin} min · ${info.distanceKm} km</div>
                </div>
                <div>
                    <span class="risk-badge ${rc}">${r.combined.toFixed(2)} ${rl}</span>
                </div>
            </div>
            <div style="font-size:11px;color:#666;margin-top:6px;">
                🚧 ${r.accAvg.toFixed(2)} &nbsp; 🚦 ${r.trafficAvg.toFixed(2)} &nbsp;
                🏭 ${r.pollAvg.toFixed(2)} &nbsp; 🏥 ${r.hospAvg.toFixed(2)}
            </div>
            <button class="turns-btn" onclick="event.stopPropagation(); showTurns(routesInfo[${info.index}])">
                📋 Turn-by-turn
            </button>
        </div>`;
    });

    document.getElementById("risk-details").innerHTML = html;
    document.getElementById("risk-score").innerHTML   = "";
    document.getElementById("advice-box").innerHTML   = "";
    document.getElementById("turn-list").innerHTML    = "";
    document.getElementById("sidebar").classList.add("open");

    // Highlight recommended by default
    highlightRoute(bestIdx);
}

function selectRoute(idx) {
    highlightRoute(idx);
    document.querySelectorAll(".route-card").forEach(el => {
        el.classList.toggle("active", Number(el.dataset.idx) === idx);
    });
}

// ─────────────────────────────────────────────────
// TURN-BY-TURN
// ─────────────────────────────────────────────────
const ICONS = {
    "turn left": "⬅", "turn sharp left": "↙", "turn slight left": "↖",
    "turn right": "➡", "turn sharp right": "↘", "turn slight right": "↗",
    "straight": "⬆", "continue": "⬆",
    "roundabout": "⭕", "rotary": "⭕",
    "merge": "🔀", "ramp": "🛣",
    "depart": "🚀", "arrive": "🏁",
    "fork": "🍴", "end of road": "🔚",
};

function stepIcon(step) {
    const m = step.maneuver || {};
    const key = `${m.type||""} ${m.modifier||""}`.trim().toLowerCase();
    for (const k of Object.keys(ICONS)) {
        if (key.includes(k)) return ICONS[k];
    }
    return "📍";
}

function stepText(step) {
    const m    = step.maneuver || {};
    const instr = m.instruction || "";
    if (instr.length > 2) {
        return instr + (step.distance ? ` — ${fmtDist(step.distance)}` : "");
    }
    let txt = [m.type, m.modifier].filter(Boolean).join(" ");
    if (step.name) txt += ` onto ${step.name}`;
    if (step.distance) txt += ` — ${fmtDist(step.distance)}`;
    return txt || "Continue";
}

function fmtDist(m) {
    return m >= 1000 ? (m/1000).toFixed(1) + " km" : Math.round(m) + " m";
}

function showTurns(info) {
    const list  = document.getElementById("turn-list");
    const steps = info.steps || [];
    list.innerHTML = "";

    if (!steps.length) {
        list.innerHTML = "<li>No turn-by-turn available.</li>";
    } else {
        steps.forEach(step => {
            const li = document.createElement("li");
            li.innerHTML = `<span class="icon">${stepIcon(step)}</span> ${stepText(step)}`;
            list.appendChild(li);
        });
    }

    document.getElementById("sidebar").classList.add("open");
}

// ─────────────────────────────────────────────────
// AUTO REFRESH — 5 MIN
// ─────────────────────────────────────────────────
setInterval(loadAllData, 5 * 60 * 1000);

// ─────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────
loadAllData();
</script>
</body>
</html>
